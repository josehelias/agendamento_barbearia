{% extends 'base.html' %}

{% block content %}
<section class="hero-home">
    <div class="hero-content">

        <form method="POST" id="form-agendamento">{% csrf_token %}
            <h2 class="mb-4 text-center">Agendamento</h2>

            <!-- Barbeiro -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-3">Selecione o barbeiro e a data para atendimento:</h5>
                    <label for="barbeiro-select" class="form-label">Barbeiros disponíveis:</label>
                    <select id="barbeiro-select" name="barb_nome" class="form-select">
                        {% for barbeiro in barbeiros %}
                        <option value="{{ barbeiro.id }}">
                            {{ barbeiro.barb_nome }}
                        </option>
                        {% endfor %}
                    </select>

                    <div class="mb-4">
                        <label for="id_data" class="form-label">Dia do atendimento:</label>
                        <input type="date" id="id_data" name="data" min="{{ hoje }}" class="form-control">
                    </div>
                </div>
            </div>

            <!-- Horários -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-3">Horários disponíveis:</h5>
                    <div class="row" id="grid-horarios">

                    </div>
                </div>
            </div>

            <!-- Serviço -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-3">Selecione o serviço desejado:</h5>
                    <label for="servico" class="form-label">Serviços disponíveis:</label>
                    <select id="servico" name="servico" class="form-select">
                        {% for servico in servicos %}
                        <option value="{{ servico.id }}">
                            {{ servico.nome }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Cliente -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-3">Dados do cliente:</h5>

                    <div class="mb-3">
                        <label for="client_nome" class="form-label">Nome do cliente:</label>
                        <input type="text" id="client_nome" name="client_nome" class="form-control" required>
                    </div>

                    <div>
                        <label for="telefone" class="form-label">Telefone do cliente:</label>
                        <input type="text" id="telefone" name="telefone" class="form-control" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="save btn btn-dark w-100">Agendar</button>
        </form>
    </div>
</section>
{% endblock %}
