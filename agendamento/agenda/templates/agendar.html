{% load static %}
<!DOCTYPE html>
<html>
    <body>
        <header>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
            <h1>Barbearia</h1>
            <p>Reserve seu horário em menos de 1 minuto</p>
        </header>

        <main class="container my-5">

            <div class="card shadow p-4">

                <!-- Barbeiro -->
                <div class="mb-4">
                    <label for="barbeiro-select" class="form-label">Serviços disponíveis:</label>
                    <select id="barbeiro-select" name="barbeiro" class="form-select">
                        {% for barbeiro in barbeiros %}
                            <option value="{{ barbeiro.id }}">
                                {{ barbeiro.barb_nome }}
                            </option>   
                        {% endfor %}
                    </select>
                </div>            

                <!-- Data -->
                <div class="mb-4">
                    <label for="id_data" class="form-label">Dia do atendimento:</label>
                        <input type="date" id="id_data" name="data" min="{{ hoje }}" class="form-control">
                </div>

                <!-- Horários -->
                <div class="mb-4">
                    <h5 class="mb-3">Horários disponíveis:</h5>
                    <div class="row" id="grid-horarios">

                    </div>
                </div>

                <!-- Serviço -->
                <div class="mb-4">
                    <label for="servico" class="form-label">Serviços disponíveis:</label>
                    <select id="servico" name="servico" class="form-select">
                        {% for servico in servicos %}
                            <option value="{{ servico.id }}">
                               {{ servico.nome }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Cliente -->
                <div class="mb-4">
                    <h5 class="mb-3">Dados do cliente:</h5>

                    <div class="mb-3">
                        <label for="nome_cliente" class="form-label">Nome do cliente:</label>
                        <input type="text" id="nome_cliente" name="nome_cliente" class="form-control" required>
                    </div>

                    <div>
                        <label for="telefone_cliente" class="form-label">Telefone do cliente:</label>
                        <input type="text" id="telefone_cliente" name="telefone_cliente" class="form-control" required>
                    </div>
                </div>

                <button class="btn btn-dark w-100">Agendar</button>

            </div>

        </main>

        <script src="{% static 'js/agendamento.js' %}"></script>

    </body>
</html>
