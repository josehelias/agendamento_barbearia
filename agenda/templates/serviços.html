{% extends 'base.html' %}
{% load static % }

{% block content %}

<div class="py-5 hero-home">
    <div class="container hero-content">
        <h2 class="text-center text-warning mb-5 fw-bold">NOSSOS SERVIÇOS</h2>

        <div class="row g-4 justify-content-center">

            {% for servico in servicos %}
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 bg-dark text-white border-secondary">
                    <div class="card-body p-4">
                        <h4 class="card-title fw-bold text-center">{{ servico.nome }}</h4>
                        <p class="text-secondary text-center small">{{ servico.descricao }}</p>
                        <div class="d-flex justify-content-between align-items-center mt-4">
                            <span class="text-warning fw-bold fs-5">R$ {{ servico.preco|floatformat:2 }}</span>
                            <a href="{% url 'agendamentos' %}?servico={{ servico.id }}" class="btn btn-outline-warning btn-sm">Agendar</a>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}

        </div>
    </div>
</div>

{% endblock %}
